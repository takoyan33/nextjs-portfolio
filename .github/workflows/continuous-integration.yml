# Workflow名（GitHub Actions画面に表示される）
name: nextjs-ci

# 実行トリガー
on:
  push:
    branches: [main] # mainブランチへのpush時
  pull_request:
    branches: [main] # main向けPR作成時

jobs:
  nextjs-ci:
    # 実行環境（GitHubのUbuntuランナー）
    runs-on: ubuntu-latest

    # Node.jsのマトリックス設定
    strategy:
      matrix:
        node-version: [24.x]

    steps:
      # リポジトリをチェックアウト
      - uses: actions/checkout@v4

      # Node.jsセットアップ
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      # Corepack有効化
      # Node標準のパッケージマネージャ管理ツール
      - name: Enable Corepack
        run: corepack enable

      # pnpmバージョン固定
      # ローカル環境とCIのpnpmを一致させる
      - name: Prepare pnpm
        run: corepack prepare pnpm@10.0.0 --activate

      # Node / pnpm / Corepack のバージョン確認
      # CIトラブル時のデバッグ用
      - name: Check versions
        run: |
          node -v
          corepack --version
          pnpm -v

      # 依存関係インストール
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # コードフォーマットチェック
      # Prettierなどでフォーマットが崩れていないか確認
      - name: Format code
        run: pnpm format:check

      # Lintチェック
      # ESLintなどによるコード品質チェック
      - name: Lint code
        run: pnpm lint

      # React Doctor 実行
      # Reactのアンチパターンやパフォーマンス問題を検出
      - name: React Doctor
        id: react-doctor
        run: |
          npx -y react-doctor@latest . --verbose
        continue-on-error: true
        # エラーでもCIを落とさない（診断目的）

      # React Doctor スコア取得
      # プロジェクトのReact健全度スコアを取得
      - name: React Doctor Score
        id: score
        run: |
          SCORE=$(npx -y react-doctor@latest . --score 2>/dev/null || echo "0")
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          echo "React Doctor Health Score: $SCORE"
        continue-on-error: true
        # スコア取得失敗でもCIを止めない
